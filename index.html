<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome this page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card" data-testid="login-card">
            <div class="login-header">
                <h1 data-testid="login-title">Welcome Back</h1>
                <p data-testid="login-subtitle">Sign in to continue your journey</p>
            </div>

            <form id="loginForm" data-testid="login-form">
                <div class="form-group">
                    <label for="email" data-testid="email-label">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        data-testid="email-input"
                        required
                    >
                    <span class="error-message" id="emailError" data-testid="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password" data-testid="password-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            data-testid="password-input"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" data-testid="toggle-password-btn">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError" data-testid="password-error"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me" data-testid="remember-me-label">
                        <input type="checkbox" id="rememberMe" data-testid="remember-me-checkbox">
                        <span class="checkbox-custom"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword" data-testid="forgot-password-link">
                        Forgot Password??
                    </a>
                </div>

                <button type="submit" class="login-btn" data-testid="login-submit-btn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider" data-testid="social-divider">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google" id="googleLogin" data-testid="google-login-btn">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button type="button" class="social-btn facebook" id="facebookLogin" data-testid="facebook-login-btn">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>
                <button type="button" class="social-btn github" id="githubLogin" data-testid="github-login-btn">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
            </div>

            <div class="signup-link" data-testid="signup-link">
                Don't have an account? <a href="#" id="signupLink">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal" data-testid="success-modal">
        <div class="modal-content" data-testid="success-modal-content">
            <div class="success-icon" data-testid="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2 data-testid="success-title">Login Successful!!</h2>
            <p data-testid="success-message">Welcome back! You've been successfully logged in.</p>
            <button class="modal-btn" id="closeModal" data-testid="close-modal-btn">Continue</button>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
